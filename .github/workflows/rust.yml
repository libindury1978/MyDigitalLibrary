name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Reject committed build artifacts
        run: |
          if git ls-files '**/target/**' | grep -q .; then
            echo "::error::Build artifacts under target/ must not be committed. Remove them and update .gitignore."
            git ls-files '**/target/**' | head -20
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Linux dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential

      - uses: dtolnay/rust-toolchain@stable

      - name: Cargo build
        working-directory: src-tauri
        run: cargo build --verbose

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test --verbose
